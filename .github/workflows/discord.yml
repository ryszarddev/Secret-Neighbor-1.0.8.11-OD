name: Discord Release Notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}

          # NIE MA status:

          content: "📦 New release published"
          title: "Secret Neighbor v1.0.8.11"
          description: |
            Original release build.
            No modifications.
          color: 0x2ecc71
          username: "GitHub"
